# ===============================
# BASIC CONFIG
# ===============================
spring.application.name=paceboard-backend
server.port=8080

# ===============================
# DATABASE CONFIG
# ===============================
# Use env vars as described:
# DB_URL=jdbc:postgresql://host:port/dbname
# DB_USERNAME=...
# DB_PASSWORD=...
# fallback for local dev
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/paceboard_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# TABLE CREATION (USING schema.sql)
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always

# ===============================
# HUGGING FACE AI CONFIG
# ===============================
# Configure the key in environment variables for security:
# HUGGINGFACE_API_KEY
huggingface.api.key=${HUGGINGFACE_API_KEY:}
huggingface.api.url=https://api-inference.huggingface.co/models/facebook/bart-large-mnli

# ==============================
# SECURITY & CORS
# ===============================
spring.main.allow-bean-definition-overriding=true
management.endpoints.web.exposure.include=*

# ===============================
# OPTIONAL (RECOMMENDED)
# ===============================
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true