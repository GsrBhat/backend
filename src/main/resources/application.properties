# ===============================
# BASIC CONFIG
# ===============================
spring.application.name=backend
server.port=9900

# ===============================
# DATABASE CONFIG (Local default + Render PostgreSQL / Docker overrides)
# ===============================
# Render provides DATABASE_URL=postgres://user:pass@host:port/dbname. This config supports either
# 1) JDBC_DATABASE_URL + JDBC_DATABASE_USERNAME + JDBC_DATABASE_PASSWORD + JDBC_DATABASE_DRIVER + JDBC_HIBERNATE_DIALECT,
# 2) DATABASE_URL via DatabaseConfig bean, or
# 3) local MySQL defaults for development.
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:mysql://localhost:3306/smart_hospital?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${JDBC_DATABASE_USERNAME:root}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:root}

spring.datasource.driver-class-name=${JDBC_DATABASE_DRIVER:com.mysql.cj.jdbc.Driver}
spring.jpa.database-platform=${JDBC_HIBERNATE_DIALECT:org.hibernate.dialect.MySQLDialect}

# ===============================
# TABLE CREATION (USING schema.sql)
# ==============================
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always

# ===============================
# HUGGING FACE AI CONFIG
# ===============================
# Configure the key in environment variables for security:
# HUGGINGFACE_API_KEY
huggingface.api.key=${HUGGINGFACE_API_KEY:}
huggingface.api.url=https://api-inference.huggingface.co/models/facebook/bart-large-mnli

# ==============================
# SECURITY & CORS
# ===============================
spring.main.allow-bean-definition-overriding=true
management.endpoints.web.exposure.include=*

# ===============================
# OPTIONAL (RECOMMENDED)
# ===============================
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true